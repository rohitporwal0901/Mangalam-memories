<div class="login-page">
    <div class="login-card">
        <div class="login-logo">
            <img src="/logo.png" alt="Boss Photography" />
        </div>
        <h1 class="login-title">Admin Panel</h1>
        <p class="login-sub">Boss Photography — Secure Access</p>
        <div class="gold-divider"></div>

        <form [formGroup]="form" (ngSubmit)="login()" class="login-form" novalidate>
            <div class="form-group">
                <label>Email</label>
                <input type="email" formControlName="email" placeholder="admin@bossphotography.in"
                    [class.invalid]="f('email').invalid && f('email').touched" autocomplete="email" />
                @if (f('email').invalid && f('email').touched) {
                <span class="err">Valid email required</span>
                }
            </div>

            <div class="form-group">
                <label>Password</label>
                <div class="pwd-wrap">
                    <input [type]="showPwd ? 'text' : 'password'" formControlName="password" placeholder="••••••••"
                        [class.invalid]="f('password').invalid && f('password').touched"
                        autocomplete="current-password" />
                    <button type="button" class="eye-btn" (click)="showPwd = !showPwd">
                        {{ showPwd ? '&#128065;' : '&#128065;' }}
                    </button>
                </div>
                @if (f('password').invalid && f('password').touched) {
                <span class="err">Minimum 6 characters</span>
                }
            </div>

            @if (error) {
            <div class="form-error">{{ error }}</div>
            }

            <button type="submit" class="login-btn" [disabled]="loading">
                @if (loading) { <span class="spinner"></span> } Signin
            </button>
        </form>

        <a routerLink="/" class="back-link">&#8592; Back to Website</a>

    </div>
</div>
