<section class="why-section">

    <!-- Header -->
    <div class="section-header" [class.visible]="headerVisible">
        <p class="section-label">The Mangalam Memories Difference</p>
        <h2 class="section-title">
            Why Couples Choose <em>Us</em>
        </h2>
        <p class="section-desc">
            Trusted by families across India for destination weddings,
            grand celebrations, and intimate ceremonies.
        </p>
    </div>

    <!-- 3×2 Cards Grid -->
    <div class="features-grid">
        @for (f of features; track f.title; let i = $index) {
        <div class="feature-card" [class.visible]="isVisible(i)" [style.transition-delay]="(i * 0.10) + 's'">
            <div class="card-icon-wrap">
                <span class="card-icon">{{ f.icon }}</span>
            </div>
            <h3 class="card-title">{{ f.title }}</h3>
            <p class="card-desc">{{ f.desc }}</p>
            @if (f.tag) {
            <span class="card-tag">{{ f.tag }}</span>
            }
        </div>
        }
    </div>

</section>
