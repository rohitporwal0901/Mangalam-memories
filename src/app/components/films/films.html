<section id="films" class="films-section">

    @if (loading) {
    <div class="films-skeleton"></div>
    }

    <!-- All layers stacked — only active one visible -->
    @for (f of films; track f.videoId; let i = $index) {
    <div class="film-layer" [class.film-layer--active]="i === activeIndex">

        <!-- Inactive: show thumbnail as background -->
        @if (i !== activeIndex) {
        <div class="film-thumb-bg" [style.backgroundImage]="'url(' + f.thumbImg + ')'"></div>
        }

        <!-- Active only: load iframe WITH audio -->
        @if (i === activeIndex) {
        <div class="film-video-wrap">
            <iframe
                [src]="f.safeUrl"
                frameborder="0"
                allow="autoplay; encrypted-media; gyroscope; picture-in-picture"
                class="film-iframe">
            </iframe>
        </div>
        }

        <!-- Overlay gradient -->
        <div class="film-overlay"></div>

        <!-- Info — zigzag: even index → RIGHT, odd → LEFT -->
        <div class="film-info" [class.film-info--left]="i % 2 !== 0">
            <p class="film-tag">{{ f.title }}</p>
            <h2 class="film-names">{{ f.coupleNames }}</h2>
            <div class="film-rule"></div>
            <p class="film-location">{{ f.location }}</p>
        </div>

    </div>
    }

    <!-- Gold progress tick bar -->
    <div class="progress-track" aria-hidden="true">
        <div class="progress-fill"
             [class.progress-even]="activeIndex % 2 === 0"
             [class.progress-odd]="activeIndex % 2 !== 0">
        </div>
    </div>

</section>
