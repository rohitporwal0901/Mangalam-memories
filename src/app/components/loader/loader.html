<div class="loader-wrap" [class.hide]="hiding">

    <!-- Fullscreen photo grid bg — WeddingClickz style -->
    <div class="loader-grid">
        @for (img of gridImages; track img) {
        <div class="grid-cell">
            <img [src]="img" alt="" class="grid-img" aria-hidden="true" loading="eager" />
        </div>
        }
    </div>

    <!-- Heavy dim overlay -->
    <div class="grid-dim"></div>

    <!-- Center brand — WeddingClickz style: just logo + name -->
    <div class="brand-center" [class.visible]="showLogo">

        <!-- Circular logo emblem -->
        <div class="loader-logo-ring">
            <img src="/logo.png" alt="Mangalam Memories" class="loader-logo" />
        </div>

        <!-- Brand name — exactly like WeddingClickz.com -->
        <h1 class="loader-brand" [class.visible]="showText">
            <span class="lb-white">Mangalam</span><span class="lb-gold">Memories</span>
        </h1>

        <!-- Thin gold divider line -->
        <div class="loader-divider" [class.visible]="showText"></div>

        <!-- Tagline -->
        <p class="loader-tagline" [class.visible]="showText">
            Premium Indian Wedding Photography
        </p>

    </div>

    <!-- Slim progress bar at very bottom -->
    <div class="loader-progress">
        <div class="loader-bar" [style.width.%]="progress"></div>
    </div>

</div>
