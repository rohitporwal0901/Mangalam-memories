<section id="home" class="hero-section" [class.loaded]="isLoaded">

    <!-- Dark ambient background -->
    <div class="hero-bg">
        @if (bgVideoUrl) {
        <div class="video-bg-container">
            <iframe 
                [src]="bgVideoUrl" 
                frameborder="0" 
                allow="autoplay; encrypted-media" 
                allowfullscreen>
            </iframe>
            <div class="video-overlay"></div>
        </div>
        } @else {
        <!-- Dark fallback placeholder -->
        <div class="video-placeholder"></div>
        }
        <div class="hero-bg-glow glow-a"></div>
        <div class="hero-bg-glow glow-b"></div>
    </div>

    <!-- ══════════════════════════════════════
         TOP BRAND BLOCK
    ══════════════════════════════════════ -->
    <div class="top-brand" [class.visible]="isLoaded">

        <!-- Logo badge circle (like WeddingClickz emblem) -->
        <div class="logo-badge">
            <img src="/logo_dark.png" alt="Boss Photography" class="logo-img" />
        </div>

        <!-- Title -->
        <h1 class="hero-title">
            <span class="title-white">Boss</span><span class="title-gold">Photography</span>
        </h1>

        <!-- Tagline -->
        <p class="hero-tagline">Premium Indian Wedding Photography</p>

    </div>

    <!-- ══════════════════════════════════════
         PHOTO STRIP — CSS MARQUEE
         Renders cards twice for seamless loop
    ══════════════════════════════════════ -->
    <div class="photo-strip-wrap" [class.visible]="isLoaded">

        <div class="photo-strip">
            <!-- First set -->
            @for (photo of photoStrip; track photo.url + 'a'; let i = $index) {
            <div class="photo-card" [class.center]="i === activeCardIndex" (click)="setActive(i)">
                <img [src]="photo.url" [alt]="photo.alt" class="photo-img" loading="lazy" />
                <div class="photo-overlay"></div>
            </div>
            }
            <!-- Duplicate set for seamless marquee loop (hidden on mobile via CSS) -->
            @for (photo of photoStrip; track photo.url + 'b') {
            <div class="photo-card duplicate" aria-hidden="true">
                <img [src]="photo.url" [alt]="photo.alt" class="photo-img" loading="lazy" />
                <div class="photo-overlay"></div>
            </div>
            }
        </div>

        <!-- Fade edges -->
        <div class="strip-fade strip-fade-left"></div>
        <div class="strip-fade strip-fade-right"></div>
    </div>

</section>
